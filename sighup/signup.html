<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniGram Sign Up</title>
<link rel="stylesheet" href="signup.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="ripple-layer"></div>

<div class="login-container">
  <h1 class="logo">MiniGram</h1>

  <input type="text" id="fullname" placeholder="Full Name">
  <input type="text" id="username" placeholder="Username">
  <input type="email" id="email" placeholder="Email">

  <div class="password-box">
    <input type="password" id="password" placeholder="Password">
    <span id="togglePassword"><i class="fa-solid fa-eye-slash"></i></span>
  </div>

  <input type="password" id="confirmPassword" placeholder="Confirm Password">

  <button id="signupBtn">Sign Up</button>

  <p class="signup">
    Already have an account?
    <a href="/storage/emulated/0/MINIGRAM1/login/login.html"><b>Login</b></a>
  </p>
</div>

<script src="signup.js"></script>

</body>
</html>
