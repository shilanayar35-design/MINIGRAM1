<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Activity</title>
  <link rel="stylesheet" href="activity.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <button class="back">
      <!-- BACK ICON (clean iOS style) -->
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M15 5L8 12L15 19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1>Your activity</h1>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h2>One place to manage your activity</h2>
    <p>View and manage your interactions, content and account activity.</p>
  </div>

  <!-- INTERACTIONS -->
  <div class="section">
    <h3>Interactions</h3>

    <div class="item" onclick="openPage('likes')">
      <div class="left">
        <!-- HEART (better balanced) -->
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M20.8 8.6c0 5-8.8 10.4-8.8 10.4S3.2 13.6 3.2 8.6C3.2 6 5.2 4 7.8 4c1.6 0 3.1.8 4.2 2.2C13.1 4.8 14.6 4 16.2 4c2.6 0 4.6 2 4.6 4.6z"
          stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p>Likes</p>

      <svg class="arrow" viewBox="0 0 24 24">
        <path d="M9 5L16 12L9 19" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- REMOVED -->
  <div class="section">
    <h3>Removed and archived content</h3>

    <div class="item" onclick="openPage('deleted')">
      <div class="left">
        <!-- TRASH (clean modern) -->
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 7H20" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M9 7V5H15V7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M6 7L7 19H17L18 7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <p>Recently Deleted</p>

      <svg class="arrow" viewBox="0 0 24 24">
        <path d="M9 5L16 12L9 19" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="item" onclick="openPage('archive')">
      <div class="left">
        <!-- CLOCK (clean + centered) -->
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="8.5" stroke="white" stroke-width="1.8"/>
          <path d="M12 8V12L15 14" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <p>Archive</p>

      <svg class="arrow" viewBox="0 0 24 24">
        <path d="M9 5L16 12L9 19" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

  </div>

</div>

<script src="activity.js"></script>
</body>
</html>
